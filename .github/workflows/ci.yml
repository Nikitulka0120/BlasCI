name: BLAS CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y g++ libopenblas-dev python3 python3-pip

      - name: Install Python dependencies
        run: |
          pip3 install -r requirements.txt

      - name: Build C++ benchmark
        run: |
          g++ src/main.cpp -O2 -lopenblas -o benchmark

      - name: Upload benchmark binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: benchmark


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip libopenblas-dev
          pip3 install -r requirements.txt

      - name: Run pytest
        run: |
          pytest -v tests/

  benchmark:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install OpenBLAS runtime
      run: |
        sudo apt update
        sudo apt install -y libopenblas-dev

    - name: Download benchmark binary
      uses: actions/download-artifact@v4
      with:
        name: benchmark

    - name: Make executable
      run: chmod +x benchmark

    - name: Run performance test
      run: |
        ./benchmark