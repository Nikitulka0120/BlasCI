name: BLAS CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y g++ libopenblas-dev python3 python3-pip

      - name: Install Python dependencies
        run: |
          pip3 install -r requirements.txt

      - name: Build C++ benchmark
        run: |
          g++ src/main.cpp -O2 -lopenblas -o benchmark

      - name: Run pytest (BLAS interface tests)
        run: |
          pytest -v tests/

      - name: Run performance test
        run: |
          ./benchmark